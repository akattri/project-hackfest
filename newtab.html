<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hackfest Landing Page</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="header-content">
          <h1>Hackfest Landing Page</h1>

          <div class="auth-section">
            <div id="user-email" class="user-email"></div>
            <button id="auth-button" class="btn btn-primary" type="button">Sign in with Google</button>
          </div>
        </div>
      </header>

      <main class="dashboard">
        <section class="card">
          <div class="card-header">
            <h2>📑 Bookmarks</h2>
            <button id="add-bookmark" class="btn btn-small" type="button">+ Add</button>
          </div>

          <div id="bookmarks-empty" class="empty-state visible">No bookmarks found.</div>
          <div id="bookmarks-list" class="bookmarks-list"></div>
        </section>

        <section class="card">
          <div class="card-header">
            <h2>✓ Tasks</h2>
            <button id="refresh-todos" class="btn btn-small" type="button">↻ Sync</button>
          </div>

          <div id="todos-empty" class="empty-state visible">Sign in to load your Google Tasks.</div>
          <div id="todos-list" class="todos-list"></div>

          <div class="todo-input-group">
            <input id="new-todo" class="todo-input" type="text" placeholder="Add a task…" />
            <button id="add-todo" class="btn btn-primary" type="button">Add</button>
          </div>
        </section>

        <section class="card">
          <div class="card-header">
            <h2>📅 Calendar</h2>
            <button id="refresh-calendar" class="btn btn-small" type="button">↻ Sync</button>
          </div>

          <div id="calendar-empty" class="empty-state visible">Sign in to load upcoming events.</div>
          <div id="calendar-events" class="calendar-events"></div>
        </section>
      </main>

      <footer class="footer">
        <span>Hackfest Extension</span>
        <span class="footer-sep">•</span>
        <span>Bookmarks • Tasks • Calendar</span>
      </footer>
    </div>

    <script src="newtab.js"></script>
  </body>
</html>
