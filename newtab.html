<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <title>New Tab</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>

<body>
  <div class="container">
    <div class="top-bar">
      <div class="corner-title">Archon</div>
      <div class="auth-section top-auth">
        <div id="user-email" class="user-email"></div>
        <button id="layout-toggle" class="btn btn-small btn-icon" type="button" title="Toggle Layout" aria-label="Toggle Layout"><span
            class="material-symbols-outlined">grid_view</span></button>
        <button id="auth-button" class="btn btn-primary" type="button">Sign in with Google</button>
        <button id="sign-out-button" class="btn btn-small" type="button" style="display: none;">Sign Out</button>
      </div>
    </div>
    <div id="clock" class="clock"></div>

    <main class="dashboard" role="main">
      <section class="card search-card search-omnibar">
        <form id="search-form" class="search-section">
          <div class="search-bar-wrapper">
            <span class="material-symbols-outlined search-icon">search</span>
            <input id="global-search" type="text" placeholder="Search the web or type a URL..." autocomplete="off" />
          </div>
          <div id="search-suggestions" class="search-suggestions"></div>
        </form>
      </section>

      <section class="card bookmarks-card">
        <div class="card-header">
          <h2 style="display: flex; align-items: center; gap: 8px;">
            <span class="material-symbols-outlined">bookmarks</span> Bookmarks
          </h2>
          <div style="display: flex; gap: 8px;">
            <button id="toggle-bookmark-view" class="btn btn-small btn-icon" type="button"
              title="Toggle Folder View" aria-label="Toggle Folder View"><span class="material-symbols-outlined">folder</span></button>
            <button id="add-bookmark" class="btn btn-small btn-icon" type="button" title="Add Bookmark" aria-label="Add Bookmark"><span
                class="material-symbols-outlined">add</span></button>
          </div>
        </div>

        <div id="bookmarks-empty" class="empty-state visible">No bookmarks found.</div>
        <div id="bookmarks-list" class="bookmarks-list"></div>
      </section>

      <section class="card tasks-card">
        <div class="card-header">
          <h2 style="display: flex; align-items: center; gap: 8px;"><span
              class="material-symbols-outlined">task_alt</span> Tasks</h2>
          <div style="display: flex; gap: 8px; align-items: center;">
            <button id="refresh-todos" class="btn btn-small btn-icon" type="button" title="Sync Tasks" aria-label="Sync Tasks"><span
                class="material-symbols-outlined">sync</span></button>
            <div id="task-list-wrapper" style="position: relative; display: none;">
              <button class="btn btn-small btn-icon" type="button" title="Task Lists" aria-label="Task Lists"><span
                  class="material-symbols-outlined">list</span></button>
              <select id="task-list-select"
                style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: default;"></select>
            </div>
          </div>
        </div>

        <div id="todos-empty" class="empty-state visible">
          <p>Please sign in to your account to get tasks info.</p>
          <button class="btn btn-small trigger-auth" type="button">Sign In</button>
        </div>
        <div id="todos-list" class="todos-list"></div>

        <div class="todo-input-group">
          <input id="new-todo" class="todo-input" type="text" placeholder="Add a task…" />
          <button id="add-todo" class="btn btn-primary" type="button">Add</button>
        </div>
      </section>

      <section class="card calendar-card">
        <div class="card-header">
          <h2 style="display: flex; align-items: center; gap: 8px;">
            <span class="material-symbols-outlined">calendar_month</span> Calendar
          </h2>
          <div style="display: flex; gap: 8px;">
            <button id="refresh-calendar" class="btn btn-small btn-icon" type="button" title="Sync Calendar" aria-label="Sync Calendar"><span
                class="material-symbols-outlined">sync</span></button>
            <a href="https://calendar.google.com/calendar/r/eventedit" target="_blank" class="btn btn-small btn-icon"
              title="Add Event" aria-label="Add Event"
              style="display: flex; align-items: center; justify-content: center; text-decoration: none;"><span
                class="material-symbols-outlined">add</span></a>
          </div>
        </div>

        <div id="calendar-empty" class="empty-state visible">
          <p>Please sign in to your account to get calendar info.</p>
          <button class="btn btn-small trigger-auth" type="button">Sign In</button>
        </div>
        <div id="calendar-events" class="calendar-events"></div>
      </section>
    </main>

  </div>
  
  <div id="hig-toast-container"></div>

  <script src="newtab.js"></script>
</body>

</html>
